<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Tasks - To-Do List</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <main class="container">
    <header class="header">
      <div class="icon-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="6" height="6" rx="1"/><path d="m3 17 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/></svg>
      </div>
      <h1>My Tasks</h1>
      <p class="subtitle">Stay organized, get things done</p>
    </header>

    <form class="input-form" id="todoForm">
      <input type="text" id="todoInput" placeholder="Add a new task..." required>
      <button type="submit" class="add-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        <span>Add</span>
      </button>
    </form>

    <div class="stats" id="stats"></div>

    <ul class="todo-list" id="todoList"></ul>

    <footer class="footer">Tasks are saved locally in your browser</footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
